<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6C5CE7"/>
      <stop offset="1" stop-color="#00D2FF"/>
    </linearGradient>
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#6C5CE7" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#6C5CE7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#00D2FF" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#00D2FF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#FFFFFF" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#0A0A0A"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <circle cx="180" cy="120" r="360" fill="url(#orb1)"/>
  <circle cx="1050" cy="560" r="340" fill="url(#orb2)"/>

  <!-- tag -->
  <g transform="translate(100, 210)">
    <circle cx="8" cy="8" r="8" fill="url(#grad)"/>
    <text x="28" y="14" font-family="'Space Grotesk', sans-serif" font-size="26"
          fill="#A0A0A0" letter-spacing="2">WEBSITES WITHOUT BORDERS</text>
  </g>

  <!-- title -->
  <text x="100" y="330" font-family="'Space Grotesk', 'DM Sans', sans-serif" font-size="96"
        font-weight="700" fill="#FFFFFF" letter-spacing="-3">Borderless</text>
  <text x="100" y="440" font-family="'Space Grotesk', 'DM Sans', sans-serif" font-size="96"
        font-weight="700" fill="url(#grad)" letter-spacing="-3">Studio</text>

  <!-- sub -->
  <text x="104" y="520" font-family="'Inter', sans-serif" font-size="32"
        fill="#A0A0A0">Fast, AI-powered, multilingual websites · NL · PL · EN</text>
</svg>
